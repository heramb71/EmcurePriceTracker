# Nginx reverse proxy for Emcure WhatsApp Bot
# Replace YOUR_DOMAIN with your DuckDNS subdomain (e.g. emcure-bot.duckdns.org)
#
# After certbot runs, it will modify this file automatically to add SSL config.
# Manual setup:
#   sudo cp nginx.conf /etc/nginx/sites-available/emcure-bot
#   sudo ln -s /etc/nginx/sites-available/emcure-bot /etc/nginx/sites-enabled/
#   sudo nginx -t && sudo systemctl reload nginx
#   sudo certbot --nginx -d YOUR_DOMAIN

server {
    listen 80;
    server_name YOUR_DOMAIN;

    location / {
        proxy_pass         http://127.0.0.1:5001;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 30s;
    }
}
