# Nginx reverse proxy for Emcure WhatsApp Bot — hardened template
#
# After certbot runs, it will add SSL directives automatically.
# The limit_req_zone directive lives in /etc/nginx/conf.d/emcure-ratelimit.conf
# (written by oracle_setup.sh / harden.sh).
#
# Manual setup:
#   sudo cp nginx.conf /etc/nginx/sites-available/emcure-bot
#   sudo ln -s /etc/nginx/sites-available/emcure-bot /etc/nginx/sites-enabled/
#   sudo nginx -t && sudo systemctl reload nginx
#   sudo certbot --nginx -d YOUR_DOMAIN

server {
    listen 80;
    server_name YOUR_DOMAIN;

    # Security headers
    add_header X-Frame-Options DENY always;
    add_header X-Content-Type-Options nosniff always;
    add_header Referrer-Policy no-referrer always;
    add_header X-XSS-Protection "1; mode=block" always;
    # HSTS added after SSL is in place (certbot --redirect)
    # add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    # Rate-limited WhatsApp webhook endpoint
    location /whatsapp {
        limit_req zone=webhook burst=5 nodelay;
        proxy_pass         http://127.0.0.1:5001;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 30s;
    }

    location / {
        proxy_pass         http://127.0.0.1:5001;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 30s;
    }
}

# Self-hosted ntfy push server (alert channel). Subdomain vhost — DuckDNS
# resolves *.YOUR_DOMAIN to this host, so certbot -d ntfy.YOUR_DOMAIN works.
# Streaming-friendly: HTTP/1.1 + buffering off for ntfy's SSE connections.
#   sudo certbot --nginx -d ntfy.YOUR_DOMAIN
server {
    listen 80;
    server_name ntfy.YOUR_DOMAIN;

    location / {
        proxy_pass         http://127.0.0.1:2586;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_connect_timeout   3m;
        proxy_send_timeout      3m;
        proxy_read_timeout      3m;
        proxy_buffering         off;
        proxy_request_buffering off;
    }
}
