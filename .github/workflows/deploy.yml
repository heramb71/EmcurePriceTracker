name: Deploy to Oracle Cloud

# Manual-only — this never deploys automatically. You click "Run workflow",
# then must select DEPLOY in the confirmation dropdown to proceed.
#
# The actual work is done by deploy/update.sh on the server — the exact same
# script you'd run by hand: sync main, refresh deps, reinstall units, restart
# every installed emcure-* service. To auto-deploy on merge, add:
#   push:
#     branches: [main]
on:
  workflow_dispatch:
    inputs:
      confirm:
        description: "Confirm deploy to PRODUCTION (select DEPLOY)"
        required: true
        type: choice
        options:
          - "no"
          - "DEPLOY"
        default: "no"

# Never run two deploys at once.
concurrency:
  group: deploy-production
  cancel-in-progress: false

jobs:
  # Gate: production never ships code whose tests fail.
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: pip
      - name: Install core deps
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-core.txt
      - name: Run tests
        env:
          FINBERT_MODEL_PATH: skip
        run: python -m pytest -q

  deploy:
    needs: test
    runs-on: ubuntu-latest
    # Optional approval gate: protect this Environment with required reviewers
    # in repo Settings → Environments → production to require a human Approve.
    environment: production
    steps:
      - name: Confirmation gate
        if: ${{ inputs.confirm != 'DEPLOY' }}
        run: |
          echo "::error::Deploy not confirmed — re-run and select 'DEPLOY'."
          exit 1

      - name: Deploy over SSH (runs deploy/update.sh)
        env:
          SSH_PRIVATE_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
          SSH_HOST: ${{ secrets.SSH_HOST }}
          SSH_USER: ${{ secrets.SSH_USER }}
          SSH_PORT: ${{ secrets.SSH_PORT }}
        run: |
          set -euo pipefail
          if [ -z "${SSH_PRIVATE_KEY:-}" ] || [ -z "${SSH_HOST:-}" ] || [ -z "${SSH_USER:-}" ]; then
            echo "::error::Missing required secrets: SSH_PRIVATE_KEY, SSH_HOST, SSH_USER."
            exit 1
          fi
          PORT="${SSH_PORT:-22}"

          mkdir -p ~/.ssh && chmod 700 ~/.ssh
          printf '%s\n' "$SSH_PRIVATE_KEY" > ~/.ssh/id_deploy
          chmod 600 ~/.ssh/id_deploy
          ssh-keyscan -p "$PORT" -H "$SSH_HOST" >> ~/.ssh/known_hosts 2>/dev/null || true

          echo "Deploying main to $SSH_USER@$SSH_HOST:$PORT via deploy/update.sh"
          # update.sh must already exist on the server (from a prior deploy or
          # the first-time setup). It self-updates when it syncs the repo.
          # Direct path (not `bash …`) so it matches a narrow sudoers rule:
          #   <deploy-user> ALL=(root) NOPASSWD: /opt/emcure/deploy/update.sh
          ssh -i ~/.ssh/id_deploy -p "$PORT" \
            -o StrictHostKeyChecking=accept-new \
            "$SSH_USER@$SSH_HOST" \
            "sudo -n /opt/emcure/deploy/update.sh"

      - name: Cleanup key
        if: always()
        run: rm -f ~/.ssh/id_deploy
